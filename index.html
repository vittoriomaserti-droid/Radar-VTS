<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTS TOSCANA PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #home-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border: 4px solid #0f0; box-sizing: border-box;
        }
        #radar-screen { width: 100vw; height: 100vh; position: absolute; z-index: 1; filter: invert(100%) hue-rotate(180deg) brightness(90%); }
        #vts-panel {
            position: absolute; top: 10px; right: 10px; background: rgba(0, 20, 0, 0.9);
            border: 2px solid #0f0; padding: 15px; z-index: 999; width: 300px; max-height: 90vh; overflow-y: auto;
        }
        .section { border: 1px solid #004400; padding: 10px; margin-top: 10px; border-radius: 5px; }
        button { background: #004400; color: #fff; border: 1px solid #0f0; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 5px; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 60px; text-align: center; font-size: 20px; }
        .ship-tag { background: black !important; color: #0f0 !important; border: 1px solid #0f0 !important; font-size: 10px !important; }
        #alert-msg { position: fixed; top: 20px; left: 20px; color: red; background: black; border: 2px solid red; padding: 15px; z-index: 2000; display: none; font-weight: bold; animation: blink 0.6s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="alert-msg">⚠️ ALLERTA PARTENZA</div>

<div id="home-screen">
    <h1>VTS RADAR SYSTEM</h1>
    <div style="margin: 20px;">
        <input type="number" id="start-h" value="05"> : <input type="number" id="start-m" value="30">
    </div>
    <button onclick="avviaMissione()" style="width: 280px; font-size: 20px;">INIZIA MISSIONE</button>
</div>

<div id="radar-screen"></div>

<div id="vts-panel">
    <div style="display:flex; justify-content:space-between; font-size: 20px;">
        <div id="vts-clock">00:00</div>
        <div style="color: yellow;">PTS: <span id="punti">0</span></div>
    </div>
    <div class="section">
        <h3>RADIO PORTO</h3>
        <div id="lista-navi"></div>
    </div>
    <div class="section">
        <h3>TRACKING</h3>
        <div id="tab-correnti" style="font-size: 11px;"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        isPaused = false;
