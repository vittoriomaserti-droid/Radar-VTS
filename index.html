<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>VTS COMMAND CENTER - Arcipelago Toscano</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        /* RADAR SCREEN CON EFFETTO FOSFORI VERDI */
        #radar-screen { 
            width: 100vw; height: 100vh; position: absolute; z-index: 1; 
            filter: invert(100%) hue-rotate(180deg) brightness(90%) contrast(150%);
        }

        /* CONSOLE COMANDO VTS */
        #vts-panel {
            position: absolute; top: 10px; right: 10px; background: rgba(0, 20, 0, 0.9);
            border: 2px solid #00ff00; color: #00ff00; padding: 15px; z-index: 999;
            width: 420px; border-radius: 5px; max-height: 95vh; overflow-y: auto;
            box-shadow: 0 0 15px #00ff00;
        }

        #vts-clock { font-size: 42px; font-weight: bold; color: #00ffff; text-align: center; border-bottom: 2px solid #00ff00; margin-bottom: 10px; }
        .section { margin-bottom: 15px; border: 1px solid #004400; padding: 10px; }
        h3 { font-size: 14px; margin: 0 0 10px; color: #ffff00; text-transform: uppercase; text-align: center; }

        /* ALERT BOX LAMPEGGIANTE */
        #alert-box { 
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%); 
            z-index: 1001; width: 500px; text-align: center; 
            background: #ff0000; color: #fff; font-weight: bold; 
            padding: 20px; border: 4px solid #fff; display: none;
            animation: blinker 0.8s linear infinite; font-size: 20px;
        }
        @keyframes blinker { 50% { opacity: 0; } }

        .ship-action-card { 
            background: rgba(0, 40, 0, 0.5); border: 1px solid #00ff00; 
            padding: 10px; margin-bottom: 10px;
        }
        
        .btn-authorize { 
            background: #00ff00; color: #000; border: none; padding: 10px; 
            font-weight: bold; cursor: pointer; width: 100%; font-size: 14px;
            margin-top: 5px;
        }
        .btn-authorize:hover { background: #fff; }
        .btn-authorize:disabled { background: #333; color: #666; cursor: not-allowed; }

        #stats { display: flex; justify-content: space-between; font-size: 18px; color: #ffff00; margin-bottom: 10px; }
        
        .ship-icon { transition: transform 0.2s linear; }
    </style>
</head>
<body>

<div id="alert-box">AVVISO: NAVE PRONTA ALLA MANOVRA</div>
<div id="radar-screen"></div>

<div id="vts-panel">
    <div id="vts-clock">05:25</div>
    
    <div id="stats">
        <span>PUNTI: <b id="punti">0</b></span>
        <span>METEO: <b id="meteo-label">OTTIMO</b></span>
    </div>

    <div class="section">
        <h3>CONTROLLO PARTENZE (MANUALE)</h3>
        <div id="dispatch-console">
            <p id="no-dispatch" style="font-size: 12px; text-align: center; color: #666;">NESSUNA NAVE IN PRONTEZZA</p>
        </div>
    </div>

    <div class="section">
        <h3>STATO NAVIGLIO IN MARE</h3>
        <table style="width: 100%; font-size: 11px; text-align: left;">
            <thead><tr style="color: #ffff00;"><th>UNITÀ</th><th>DEST.</th><th>NODI</th></tr></thead>
            <tbody id="active-ships"></tbody>
        </table>
    </div>

    <div class="section">
        <h3>METEO SERVICE</h3>
        <select id="meteo-select" onchange="updateMeteo(this.value)" style="width: 100%; background: #000; color: #00ff00; border: 1px solid #00ff00;">
            <option value="SOLE">MARE CALMO (100% Speed)</option>
            <option value="VENTO">VENTO FORTE (-15% Speed)</option>
            <option value="MOSSO">MARE MOSSO (Blocco Aliscafi)</option>
        </select>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, points = 0, gameMinutes = 325; // Inizia 5 min prima della prima corsa (05:30)
    let flotta = [], currentWeather = 'SOLE';

    const PORTS = {
        PIOMBINO: [42.928, 10.540], PORTOFERRAIO: [42.814, 10.328], RIO_MARINA: [42.816, 10.428],
        LIVORNO: [43.550, 10.300], BASTIA: [42.730, 9.450], CAPRAIA: [43.050, 9.840]
    };

    // ROTTE REALI DAL TUO BOLLETTINO
    const schedule = [
        { t: 330, id: 'niki', ship: 'MOBY NIKI', from: 'PIOMBINO', to: 'PORTOFERRAIO', info: 'Molo 8' },
        { t: 390, id: 'marm', ship: 'MARMORICA', from: 'PIOMBINO', to: 'PORTOFERRAIO', info: 'Molo 6' },
        { t: 465, id: 'accia', ship: 'ACCIARELLO', shipType: 'Ferry', from: 'PIOMBINO', to: 'PORTOFERRAIO', info: 'Molo 1' },
        { t: 480, id: 'gira', ship: 'GIRAGLIA', from: 'PIOMBINO', to: 'PORTOFERRAIO', info: 'Molo 5' },
        { t: 510, id: 'montomoli', ship: 'S. MONTOMOLI', from: 'LIVORNO', to: 'CAPRAIA', info: 'Accosto 66N' },
        { t: 520, id: 'jet', ship: 'SCHIOPPARELLO JET', shipType: 'Jet', from: 'PIOMBINO', to: 'PORTOFERRAIO', info: 'Molo 7' }
    ];

    function createShipIcon() {
        return L.divIcon({
            className: 'ship-icon',
            html: `<svg width="24" height="12" viewBox="0 0 24 12"><path d="M1,6 L23,6 M1,6 L6,1 L20,1 L23,6 L20,11 L6,11 Z" fill="white" stroke="#000" stroke-width="1"/></svg>`,
            iconSize: [24, 12], iconAnchor: [12, 6]
        });
    }

    function initRadar() {
        map = L.map('radar-screen', { zoomControl: false }).setView([42.95, 10.3], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Inizializza flotta
        schedule.forEach(s => {
            let n = {
                ...s,
                pos: [...PORTS[s.from]],
                status: 'DOCK', // DOCK, READY, SAILING
                speed: s.shipType === 'Jet' ? 0.0035 : 0.0015,
                cruise: s.shipType === 'Jet' ? 34 : 16,
                marker: null
            };
            flotta.push(n);
        });
    }

    function updateMeteo(val) {
        currentWeather = val;
        document.getElementById('meteo-label').innerText = val;
    }

    function authorizeDeparture(id) {
        let n = flotta.find(x => x.id === id);
        if (currentWeather === 'MOSSO' && n.shipType === 'Jet') {
            alert("NEGATIVO: Aliscafi bloccati per mare mosso!");
            return;
        }
        
        n.status = 'SAILING';
        n.route = [PORTS[n.to]];
        n.marker = L.marker(n.pos, { icon: createShipIcon() }).addTo(map);
        
        // Calcola bonus tempo
        let delay = Math.abs(gameMinutes - n.t);
        let bonus = Math.max(0, 50 - delay);
        points += bonus;
        document.getElementById('punti').innerText = points;
    }

    // CICLO TEMPO (1 sec = 1 min gioco)
    setInterval(() => {
        gameMinutes++;
        let h = Math.floor(gameMinutes/60)%24, m = gameMinutes%60;
        document.getElementById('vts-clock').innerText = (h<10?'0'+h:h)+':'+(m<10?'0'+m:m);

        let consoleHtml = "";
        let hasReady = false;

        flotta.forEach(n => {
            // Se mancano 5 minuti alla partenza, passa in stato READY
            if (n.status === 'DOCK' && gameMinutes >= n.t - 5) {
                n.status = 'READY';
                document.getElementById('alert-box').innerText = `⚠️ CHIAMATA VTS: ${n.ship} PRONTA AL MOLLARE GLI ORMEGGI (${n.info})`;
                document.getElementById('alert-box').style.display = 'block';
                setTimeout(() => document.getElementById('alert-box').style.display = 'none', 4000);
            }

            if (n.status === 'READY') {
                hasReady = true;
                consoleHtml += `
                    <div class="ship-action-card">
                        <b>${n.ship}</b><br><small>${n.from} ➔ ${n.to}</small><br>
                        <button class="btn-authorize" onclick="authorizeDeparture('${n.id}')">AUTORIZZA PARTENZA</button>
                    </div>`;
            }
        });

        document.getElementById('dispatch-console').innerHTML = hasReady ? consoleHtml : '<p style="text-align:center;color:#444;">SILENZIO RADIO</p>';

        // Update Tabella Attiva
        let activeHtml = "";
        flotta.filter(f => f.status === 'SAILING').forEach(f => {
            activeHtml += `<tr><td>${f.ship}</td><td>${f.to}</td><td>${f.cruise}</td></tr>`;
        });
        document.getElementById('active-ships').innerHTML = activeHtml;

    }, 1000);

    // CICLO MOVIMENTO RADAR
    setInterval(() => {
        flotta.forEach(n => {
            if (n.status !== 'SAILING' || !n.route.length) return;

            let mod = currentWeather === 'VENTO' ? 0.85 : 1.0;
            let t = n.route[0];
            let dLat = t[0] - n.pos[0], dLng = t[1] - n.pos[1];
            let dist = Math.sqrt(dLat*dLat + dLng*dLng);

            if (dist < 0.005) {
                n.status = 'ARRIVED';
                map.removeLayer(n.marker);
            } else {
                n.pos[0] += (dLat/dist) * (n.speed/5) * mod;
                n.pos[1] += (dLng/dist) * (n.speed/5) * mod;
                n.marker.setLatLng(n.pos);
            }
        });
    }, 50);

    initRadar();
</script>
</body>
</html>
