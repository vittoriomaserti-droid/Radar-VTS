<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Traffic Manager - Elba Semplice</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #333; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00ff00; }
        #map { flex-grow: 1; width: 100%; }
        #controls { padding: 15px; background: #222; border-top: 2px solid #444; height: 150px; overflow-y: auto; }
        button { padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; border: none; }
        .btn-play { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        .log-msg { font-family: monospace; border-bottom: 1px solid #333; padding: 5px 0; color: #00ff00; }
        .alert { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-size: 1.2em; font-weight: bold;">TRAFFIC MANAGER ELBA</div>
    <div id="clock" style="font-size: 2em; background: #000; padding: 5px 15px; border-radius: 5px;">05:00</div>
    <div>
        <button class="btn-stop" onclick="isRunning = false">STOP</button>
        <button class="btn-play" onclick="isRunning = true">PLAY</button>
    </div>
</div>

<div id="map"></div>

<div id="controls">
    <div id="log">Benvenuto. Clicca PLAY per iniziare la simulazione.</div>
</div>

<audio id="beep"><source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg"></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Setup della Mappa su Portoferraio
    const map = L.map('map').setView([42.81, 10.31], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. Coordinate Porti
    const piombino = [42.92, 10.54];
    const portoferraio = [42.81, 10.31];

    // 3. Orari Traghetti (Dati reali)
    const traghetti = [
        { ora: "05:30", nave: "MOBY NIKI" },
        { ora: "06:30", nave: "MARMORICA" },
        { ora: "07:45", nave: "ACCIARELLO" },
        { ora: "08:00", nave: "GIRAGLIA" },
        { ora: "08:40", nave: "SCHIOPPARELLO JET" },
        { ora: "08:45", nave: "AETHALIA" },
        { ora: "09:30", nave: "MOBY NIKI" },
        { ora: "10:00", nave: "MARMORICA" },
        { ora: "10:45", nave: "ACCIARELLO" },
        { ora: "11:40", nave: "OGLASA" }
    ];

    let oraH = 5, oraM = 0, isRunning = false;

    // 4. Funzione principale di aggiornamento (ogni secondo reale = 1 minuto gioco)
    function aggiorna() {
        if (!isRunning) return;

        oraM++;
        if (oraM >= 60) { oraM = 0; oraH++; }
        if (oraH >= 24) oraH = 0;

        const orarioAttuale = `${oraH.toString().padStart(2, '0')}:${oraM.toString().padStart(2, '0')}`;
        document.getElementById('clock').innerText = orarioAttuale;

        // Calcolo orario per il BIP (15 min prima)
        let bM = oraM + 15, bH = oraH;
        if (bM >= 60) { bM -= 60; bH++; }
        const orarioBip = `${bH.toString().padStart(2, '0')}:${bM.toString().padStart(2, '0')}`;

        traghetti.forEach(t => {
            // Suona il bip 15 minuti prima
            if (t.ora === orarioBip) {
                document.getElementById('beep').play().catch(() => {});
                scriviLog(`[AVVISO] ${t.nave} parte tra 15 min!`, "alert");
            }
            // Fa partire la nave all'ora esatta
            if (t.ora === orarioAttuale) {
                muoviNave(t.nave);
            }
        });
    }

    function scriviLog(testo, classe) {
        const log = document.getElementById('log');
        log.innerHTML = `<div class="log-msg ${classe || ''}">${testo}</div>` + log.innerHTML;
    }

    function muoviNave(nome) {
        scriviLog(`[PARTENZA] ${nome} ha lasciato Piombino.`);
        let nave = L.circleMarker(piombino, {radius: 10, color: 'red', fillOpacity: 0.8}).addTo(map).bindTooltip(nome, {permanent: true});

        let progresso = 0;
        let animazione = setInterval(() => {
            if (!isRunning) return;
            progresso += 0.01;
            let lat = piombino[0] + (portoferraio[0] - piombino[0]) * progresso;
            let lng = piombino[1] + (portoferraio[1] - piombino[1]) * progresso;
            nave.setLatLng([lat, lng]);

            if (progresso >= 1) {
                clearInterval(animazione);
                scriviLog(`[ARRIVO] ${nome} è nel porto di Portoferraio.`);
                setTimeout(() => map.removeLayer(nave), 5000);
            }
        }, 200);
    }

    setInterval(aggiorna, 1000);
</script>
</body>
</html>
