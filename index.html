<!DOCTYPE html>
<html>
<head>
    <title>TEST VTS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: monospace; }
        #map { width: 100vw; height: 80vh; background: #111; }
        button { padding: 20px; font-size: 20px; background: #0f0; color: #000; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SISTEMA VTS - TEST EMERGENZA</h1>
    <div id="map"></div>
    <button onclick="avvia()">CLICCA PER SBLOCCARE</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function avvia() {
            alert("Sistema Sbloccato!");
            var map = L.map('map').setView([42.9, 10.5], 9);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([43.55, 10.30]).addTo(map).bindPopup('LIVORNO').openPopup();
            document.querySelector('h1').innerText = "RADAR ATTIVO";
        }
    </script>
</body>
</html>
